<?xml version="1.0" encoding="UTF-8"?>
<!--
  ElectraScan generic tenant logo placeholder.
  Used as a fallback when a company has not uploaded their own logo.
  Designed to sit in a 120x40 slot on the top-left of PDF exports.
  Electrical-trade neutral — lightning bolt mark + "YOUR LOGO" plate.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" width="240" height="80">
  <defs>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1D6EFD"/>
      <stop offset="100%" stop-color="#4B8FFF"/>
    </linearGradient>
  </defs>
  <!-- Mark -->
  <rect x="2" y="2" width="76" height="76" rx="12" fill="#0F1E35"/>
  <path
    d="M 44 16 L 22 46 L 36 46 L 30 64 L 54 34 L 40 34 Z"
    fill="url(#bolt)"
    stroke="#ffffff"
    stroke-width="1.2"
    stroke-linejoin="round"
  />
  <!-- Wordmark -->
  <text x="92" y="38" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
    font-size="16" font-weight="800" fill="#0F1E35" letter-spacing="-0.5">
    YOUR LOGO
  </text>
  <text x="92" y="56" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
    font-size="9" font-weight="600" fill="#5C7A9E" letter-spacing="1.5">
    ELECTRICAL · TRADE
  </text>
</svg>
