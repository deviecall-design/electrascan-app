<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ElectraScan — Prototype</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-dark: #0D1B2A;
  --bg-light: #F0F4F8;
  --navy: #1A3A5C;
  --blue: #1D6EFD;
  --blue-lt: #60A5FA;
  --amber: #F59E0B;
  --green: #10B981;
  --green-dk: #059669;
  --red: #EF4444;
  --purple: #8B5CF6;
  --teal: #0EA5E9;
  --white: #FFFFFF;
  --gray-lt: #94A3B8;
  --gray-md: #64748B;
  --dark-text: #1E293B;
  --card: #FFFFFF;
  --border: #E2E8F0;
  --sidebar-w: 220px;
  --topbar-h: 56px;
  --bottomnav-h: 60px;
}
html, body, #root { height: 100%; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg-light); color: var(--dark-text); overflow-x: hidden; }
@keyframes scan-progress { from { width:0% } to { width:100% } }

/* ── Layout ── */
.app { display: flex; height: 100vh; overflow: hidden; }
.sidebar {
  width: var(--sidebar-w); background: var(--bg-dark);
  display: flex; flex-direction: column; flex-shrink: 0;
  z-index: 100;
}
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar {
  height: var(--topbar-h); background: var(--white);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; gap: 12px;
  flex-shrink: 0;
}
.page-content { flex: 1; overflow-y: auto; padding: 24px; }
.bottom-nav { display: none; }

/* ── Sidebar ── */
.sidebar-logo {
  padding: 18px 16px 12px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid #1e3a5c;
}
.logo-icon {
  width: 34px; height: 34px; border-radius: 8px;
  background: linear-gradient(135deg, var(--blue), var(--teal));
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 800; color: white;
}
.logo-text { font-size: 15px; font-weight: 700; color: white; }
.logo-sub  { font-size: 10px; color: var(--gray-lt); }
.nav-section { padding: 16px 10px 4px; font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #4B5563; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; margin: 1px 6px; border-radius: 7px;
  font-size: 13px; font-weight: 500; color: var(--gray-lt);
  cursor: pointer; transition: all 0.15s; user-select: none;
}
.nav-item:hover { background: #1e3a5c; color: white; }
.nav-item.active { background: var(--blue); color: white; }
.nav-icon { font-size: 15px; width: 18px; text-align: center; }
.sidebar-footer { margin-top: auto; padding: 12px 16px; border-top: 1px solid #1e3a5c; }
.user-chip { display: flex; align-items: center; gap: 8px; }
.user-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--blue); color: white;
  font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}
.user-name { font-size: 12px; color: var(--gray-lt); }

/* ── Topbar ── */
.topbar-title { font-size: 16px; font-weight: 700; color: var(--dark-text); }
.topbar-sub { font-size: 12px; color: var(--gray-md); margin-top: 1px; }
.topbar-actions { margin-left: auto; display: flex; gap: 8px; }
.btn {
  padding: 7px 14px; border-radius: 7px; font-size: 12px; font-weight: 600;
  cursor: pointer; border: none; transition: all 0.15s; display: flex; align-items: center; gap: 6px;
}
.btn-primary { background: var(--blue); color: white; }
.btn-primary:hover { background: #1557d4; }
.btn-secondary { background: var(--border); color: var(--dark-text); }
.btn-secondary:hover { background: #d1dbe8; }
.btn-ghost { background: transparent; color: var(--gray-md); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--bg-light); }
.btn-danger { background: #fef2f2; color: var(--red); border: 1px solid #fecaca; }
.btn-danger:hover { background: #fee2e2; }
.btn-sm { padding: 5px 10px; font-size: 11px; }
.btn-amber { background: var(--amber); color: white; }

/* ── Cards & Grids ── */
.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px;
  transition: box-shadow 0.15s, transform 0.15s;
}
.card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
.card-clickable { cursor: pointer; }
.card-clickable:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
.card-dark { background: var(--bg-dark); border-color: #1e3a5c; }
.stat-card { text-align: center; }
.stat-value { font-size: 28px; font-weight: 800; }
.stat-label { font-size: 11px; color: var(--gray-md); margin-top: 4px; font-weight: 500; }

/* ── Badges ── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600;
}
.badge-blue    { background: rgba(29,110,253,0.1); color: var(--blue); }
.badge-green   { background: rgba(16,185,129,0.1); color: var(--green); }
.badge-green-dk{ background: rgba(5,150,105,0.12); color: var(--green-dk); }
.badge-amber   { background: rgba(245,158,11,0.1); color: var(--amber); }
.badge-red     { background: rgba(239,68,68,0.1);  color: var(--red); }
.badge-gray    { background: rgba(100,116,139,0.1);color: var(--gray-md); }
.badge-purple  { background: rgba(139,92,246,0.1); color: var(--purple); }

/* ── Section headings ── */
.section-title { font-size: 18px; font-weight: 700; color: var(--dark-text); margin-bottom: 4px; }
.section-sub   { font-size: 13px; color: var(--gray-md); margin-bottom: 20px; }
.label { font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--gray-md); margin-bottom: 8px; }

/* ── Tables ── */
.table-wrap { background: white; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead { background: var(--bg-light); }
th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--gray-md); border-bottom: 1px solid var(--border); }
td { padding: 11px 14px; border-bottom: 1px solid #f1f5f9; color: var(--dark-text); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f8fafc; }
tr.row-added   td { background: rgba(16,185,129,0.05); }
tr.row-removed td { background: rgba(239,68,68,0.05); }
tr.row-changed td { background: rgba(245,158,11,0.05); }
.row-added   td:first-child { border-left: 3px solid var(--green); }
.row-removed td:first-child { border-left: 3px solid var(--red); }
.row-changed td:first-child { border-left: 3px solid var(--amber); }

/* ── Upload zone ── */
.upload-zone {
  border: 2px dashed var(--border); border-radius: 12px;
  padding: 40px 20px; text-align: center; cursor: pointer;
  transition: all 0.2s; background: white;
}
.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--blue); background: rgba(29,110,253,0.03);
}
.upload-icon { font-size: 36px; margin-bottom: 12px; }
.upload-title { font-size: 15px; font-weight: 600; color: var(--dark-text); margin-bottom: 4px; }
.upload-sub { font-size: 12px; color: var(--gray-md); }
.upload-formats { display: flex; gap: 6px; justify-content: center; margin-top: 12px; flex-wrap: wrap; }

/* ── Progress bar ── */
.progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 8px; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }

/* ── Tabs ── */
.tabs {
  display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 20px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  padding: 10px 18px; font-size: 13px; font-weight: 600;
  color: var(--gray-md); cursor: pointer; border: none; background: none;
  border-bottom: 2px solid transparent; margin-bottom: -2px;
  transition: all 0.15s;
  white-space: nowrap;
  flex-shrink: 0;
}
.tab-btn:hover { color: var(--dark-text); }
.tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }

/* ── Version timeline ── */
.version-timeline { display: flex; flex-direction: column; gap: 10px; }
.version-card {
  background: white; border: 1px solid var(--border); border-radius: 10px;
  padding: 14px 16px; display: flex; align-items: center; gap: 14px; cursor: pointer;
  transition: all 0.15s;
}
.version-card:hover { border-color: var(--blue); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.version-card.active-version { border-color: var(--blue); background: rgba(29,110,253,0.03); }
.version-num {
  width: 40px; height: 40px; border-radius: 8px;
  background: var(--navy); color: white;
  font-size: 12px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}

/* ── Risk flags ── */
.risk-flag {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 11px 14px; border-radius: 8px; margin-bottom: 8px;
}
.risk-flag.high   { background: rgba(239,68,68,0.07); border-left: 3px solid var(--red); }
.risk-flag.medium { background: rgba(245,158,11,0.07); border-left: 3px solid var(--amber); }
.risk-flag.info   { background: rgba(14,165,233,0.07); border-left: 3px solid var(--teal); }
.risk-icon { font-size: 16px; margin-top: 1px; }
.risk-title { font-size: 12px; font-weight: 700; color: var(--dark-text); }
.risk-desc  { font-size: 11px; color: var(--gray-md); margin-top: 2px; }

/* ── Estimate summary ── */
.estimate-summary {
  background: var(--bg-dark); border-radius: 12px; padding: 20px;
  color: white;
}
.summary-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 13px; }
.summary-row.total { border-top: 1px solid #1e3a5c; margin-top: 8px; padding-top: 12px; font-size: 16px; font-weight: 700; }
.summary-label { color: var(--gray-lt); }
.summary-value { font-weight: 600; }
.summary-value.green { color: var(--green); }

/* ── Variation delta ── */
.delta-positive { color: var(--red); font-weight: 600; }
.delta-negative { color: var(--green); font-weight: 600; }
.delta-neutral  { color: var(--gray-md); }

/* ── Project card ── */
.project-card {
  background: white; border: 1px solid var(--border); border-radius: 12px;
  overflow: hidden; cursor: pointer; transition: all 0.15s;
}
.project-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.1); transform: translateY(-2px); }
.project-card-accent { height: 4px; }
.project-card-body { padding: 16px; }
.project-name { font-size: 14px; font-weight: 700; color: var(--dark-text); margin-bottom: 4px; }
.project-meta { font-size: 11px; color: var(--gray-md); }
.project-stats { display: flex; gap: 12px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
.project-stat { text-align: center; flex: 1; }
.project-stat-val { font-size: 15px; font-weight: 700; }
.project-stat-lbl { font-size: 10px; color: var(--gray-md); }

/* ── Input styles ── */
input[type="text"], input[type="number"], select {
  border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 10px; font-size: 13px; width: 100%;
  background: white; color: var(--dark-text);
  outline: none; transition: border-color 0.15s;
}
input:focus, select:focus { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(29,110,253,0.1); }

/* ── Pill nav (mobile project tabs) ── */
.pill-nav {
  display: flex; gap: 6px; margin-bottom: 16px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.pill-nav::-webkit-scrollbar { display: none; }
.pill {
  padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
  cursor: pointer; border: 1.5px solid var(--border); background: white; color: var(--gray-md);
  transition: all 0.15s;
  white-space: nowrap;
  flex-shrink: 0;
}
.pill.active { background: var(--blue); border-color: var(--blue); color: white; }

/* ── Variation banner ── */
.variation-banner {
  background: linear-gradient(135deg, var(--bg-dark), var(--navy));
  border-radius: 12px; padding: 20px 24px; margin-bottom: 20px;
  display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
}
.variation-badge { text-align: center; }
.variation-badge-val { font-size: 22px; font-weight: 800; }
.variation-badge-lbl { font-size: 10px; color: var(--gray-lt); text-transform: uppercase; letter-spacing: 0.5px; }
.variation-divider { width: 1px; height: 40px; background: #1e3a5c; }

/* ── Upload progress animation ── */
@keyframes shimmer {
  0% { background-position: -1000px 0; }
  100% { background-position: 1000px 0; }
}
.skeleton {
  background: linear-gradient(90deg, #f0f4f8 25%, #e2e8f0 50%, #f0f4f8 75%);
  background-size: 1000px 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 4px;
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .bottom-nav {
    display: flex; position: fixed; bottom: 0; left: 0; right: 0;
    height: var(--bottomnav-h); background: var(--bg-dark);
    border-top: 1px solid #1e3a5c; z-index: 200;
    justify-content: space-around; align-items: center;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .bottom-nav-item {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    cursor: pointer; padding: 6px 10px; border-radius: 8px;
    color: var(--gray-lt); font-size: 10px; font-weight: 600;
    transition: all 0.15s;
  }
  .bottom-nav-item.active { color: var(--blue); }
  .bottom-nav-icon { font-size: 20px; }
  .page-content { padding: 16px; padding-bottom: calc(var(--bottomnav-h) + 16px); }
  .grid-4 { grid-template-columns: repeat(2, 1fr); }
  .grid-3 { grid-template-columns: repeat(1, 1fr); }
  .grid-2 { grid-template-columns: repeat(1, 1fr); }
  .topbar { padding: 0 16px; }
  .topbar-title { font-size: 14px; }
}
@media (max-width: 480px) {
  .grid-4 { grid-template-columns: repeat(2, 1fr); }
  .variation-banner { flex-direction: column; }
}

/* ── Misc ── */
.flex { display: flex; }
.flex-center { display: flex; align-items: center; }
.gap-8 { gap: 8px; }
.gap-12 { gap: 12px; }
.gap-16 { gap: 16px; }
.mt-4  { margin-top: 4px; }
.mt-8  { margin-top: 8px; }
.mt-12 { margin-top: 12px; }
.mt-16 { margin-top: 16px; }
.mt-20 { margin-top: 20px; }
.mb-16 { margin-bottom: 16px; }
.text-sm   { font-size: 12px; }
.text-xs   { font-size: 11px; }
.text-gray { color: var(--gray-md); }
.text-right { text-align: right; }
.font-bold  { font-weight: 700; }
.w-full { width: 100%; }
.divider { height: 1px; background: var(--border); margin: 16px 0; }
.empty-state { text-align: center; padding: 48px 20px; color: var(--gray-md); }
.empty-icon  { font-size: 40px; margin-bottom: 12px; }
.empty-text  { font-size: 14px; font-weight: 600; }
.empty-sub   { font-size: 12px; margin-top: 4px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo, createContext, useContext } = React;

// ══════════════════════════════════════════════════════════════════════════
// TENANT WHITE-LABEL SYSTEM
// Every exported PDF / builder email / supplier BOM / milestone notification
// uses tenant branding. ElectraScan branding NEVER appears on external outputs.
// Internal app UI (sidebar, topbar) may still show ElectraScan branding.
// ══════════════════════════════════════════════════════════════════════════
// Default categories (§4.5) — tenants can customise.
// Each category carries its own extension attribute schema for the JSONB meta field.
const DEFAULT_CATEGORIES = [
  { id:'power',       label:'Power (GPO, switches)',           meta:['phase','amperage','ipRating'] },
  { id:'lighting',    label:'Lighting (downlights, strips)',   meta:['wattage','colourTemp','dimmable','driverIncluded'] },
  { id:'automation',  label:'Automation (blinds, curtains)',   meta:['brand','model','zones','programmingHours','commissioning'] },
  { id:'av-data',     label:'AV / Data',                       meta:['cableType','patchPanel','rackSpace'] },
  { id:'security',    label:'Security (CCTV, access)',         meta:['cameraType','storage','nvrRequired'] },
  { id:'solar',       label:'Solar / Battery',                 meta:['kw','panels','inverterBrand','cecApproved'] },
  { id:'ev',          label:'EV Charging',                     meta:['amperage','smartCharging','loadBalancing'] },
  { id:'switchboard', label:'Switchboard',                     meta:['phases','ways','mainSwitchRating'] },
];

// Line-item types (§4.2)
const LINE_ITEM_TYPES = [
  { id:'unit',         label:'Unit rate',    units:['EA','LM','M²'],   canAttachQuote:false },
  { id:'lump-sum',     label:'Lump sum',     units:['LS'],              canAttachQuote:true  },
  { id:'day-rate',     label:'Day rate',     units:['DAY'],             canAttachQuote:true  },
  { id:'labour',       label:'Labour rate',  units:['HR','DAY'],        canAttachQuote:false },
  { id:'sub-contract', label:'Sub-contract', units:['LS'],              canAttachQuote:true  },
  { id:'allowance',    label:'Allowance',    units:['LS'],              canAttachQuote:false },
];
const LINE_ITEM_TYPE_MAP = Object.fromEntries(LINE_ITEM_TYPES.map(t => [t.id, t]));

const DEFAULT_TENANT = {
  tradingName: 'Vesh Electrical Services',
  logoDataUrl: '', // PNG/SVG data URL; empty → initials monogram
  abn: '47 612 389 204',
  address: '24 Union Rd, Ascot Vale VIC 3032',
  contactEmail: 'damien@veshelectrical.com.au',
  contactPhone: '+61 3 9376 8844',
  emailReplyTo: 'damien@veshelectrical.com.au',
  accentColor: '#1D6EFD',
  categories: DEFAULT_CATEGORIES,
};

const TENANT_STORAGE_KEY = 'electrascan.tenant.v1';

const loadTenant = () => {
  try {
    const raw = localStorage.getItem(TENANT_STORAGE_KEY);
    if (!raw) return DEFAULT_TENANT;
    const parsed = JSON.parse(raw);
    // Backfill categories for older saved tenants.
    const categories = Array.isArray(parsed.categories) && parsed.categories.length ? parsed.categories : DEFAULT_CATEGORIES;
    return { ...DEFAULT_TENANT, ...parsed, categories };
  } catch { return DEFAULT_TENANT; }
};
const saveTenant = (t) => {
  try { localStorage.setItem(TENANT_STORAGE_KEY, JSON.stringify(t)); } catch {}
};

const TenantContext = createContext({ tenant: DEFAULT_TENANT, setTenant: () => {} });
const useTenant = () => useContext(TenantContext);

// Tenant letterhead — applied to ALL PDF exports and email previews.
// Never contains ElectraScan branding.
function CompanyLetterhead({ tenant, variant = 'pdf' }) {
  const initials = tenant.tradingName.split(/\s+/).slice(0, 2).map(w => w[0]).join('').toUpperCase();
  const logo = tenant.logoDataUrl
    ? <img src={tenant.logoDataUrl} alt="" style={{ height: 52, width: 'auto', maxWidth: 140, objectFit: 'contain', borderRadius: 6 }} />
    : <div style={{ height: 52, width: 52, borderRadius: 8, background: tenant.accentColor, color: 'white', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18, fontWeight: 800, letterSpacing: 0.5 }}>{initials || '—'}</div>;
  return (
    <div style={{ display: 'flex', alignItems: 'flex-start', gap: 16, padding: '16px 20px', borderBottom: `2px solid ${tenant.accentColor}`, background: 'white' }}>
      {logo}
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 16, fontWeight: 800, color: '#0D1B2A', lineHeight: 1.2 }}>{tenant.tradingName}</div>
        <div style={{ fontSize: 11, color: '#475569', marginTop: 3 }}>ABN: {tenant.abn}</div>
        <div style={{ fontSize: 11, color: '#475569', marginTop: 2 }}>
          {tenant.address} · {tenant.contactPhone} · {tenant.contactEmail}
        </div>
      </div>
      {variant === 'email' && (
        <div style={{ fontSize: 10, color: '#94A3B8', textAlign: 'right', flexShrink: 0 }}>
          Reply-to<br/><strong style={{ color: '#475569' }}>{tenant.emailReplyTo}</strong>
        </div>
      )}
    </div>
  );
}

// Tenant footer for PDF exports — no ElectraScan mention.
function CompanyFooter({ tenant }) {
  return (
    <div style={{ borderTop: `1px solid #E2E8F0`, padding: '10px 20px', fontSize: 10, color: '#94A3B8', textAlign: 'center', background: '#F8FAFC' }}>
      {tenant.tradingName} · ABN {tenant.abn} · {tenant.contactEmail} · {tenant.contactPhone}
    </div>
  );
}

// ── Mock Data ──────────────────────────────────────────────────────────────
const MOCK_PROJECTS = [
  {
    id: 1, name: 'Riverside Apartments', address: '42 Riverside Dr, Richmond VIC',
    client: 'Meriton Group', builder: 'Lendlease Construction',

// Canonical status palette (§5). Desktop + mobile use the same badge class so colours never diverge.
// Status → { className, label }
const STATUS_MAP = {
  estimating: { cls:'badge-amber',    label:'Estimating' },
  active:     { cls:'badge-green',    label:'Active' },
  submitted:  { cls:'badge-blue',     label:'Submitted' },
  approved:   { cls:'badge-green-dk', label:'Approved' },
  pending:    { cls:'badge-amber',    label:'Pending' },
  complete:   { cls:'badge-gray',     label:'Complete' },
  overdue:    { cls:'badge-red',      label:'Overdue' },
  superseded: { cls:'badge-gray',     label:'Superseded' },
};
const statusBadge = (s) => {
  const meta = STATUS_MAP[s] || { cls:'badge-gray', label:s.charAt(0).toUpperCase()+s.slice(1) };
  return <span className={`badge ${meta.cls}`}>{meta.label}</span>;
};

// Days Active RAG (§5): 0-13 default, 14-21 amber, 22+ red
const daysActiveColor = (d) => {
  if (d >= 22) return '#EF4444';
  if (d >= 14) return '#F59E0B';
  return '#64748B';
};
const daysActiveBg = (d) => {
  if (d >= 22) return '#FEF2F2';
  if (d >= 14) return '#FFFBEB';
  return '#F8FAFC';
};

  <span style={{
    display:'inline-flex', alignItems:'center', gap:4,
    fontSize:11, fontWeight:700,
    padding:'3px 9px', borderRadius:20,
    background: daysActiveBg(days),
    color: daysActiveColor(days),
    border: days>=14 ? `1px solid ${daysActiveColor(days)}40` : '1px solid transparent',

);

// ── Estimate Editor ────────────────────────────────────────────────────────
function EstimateEditor({ onNavigate }) {
  const { tenant } = useTenant();
  const [items, setItems] = useState(MOCK_LINE_ITEMS.map(i => ({...i, note:''})));
  const [margin, setMargin] = useState(15);
  const [locked, setLocked] = useState(false);
  const [locking, setLocking] = useState(false);
  const [editId, setEditId] = useState(null);
  const [recording, setRecording]   = useState(false);
  const [recordingId, setRecordingId] = useState(null);
  const [voiceInput, setVoiceInput]  = useState('');
  const [showVoice, setShowVoice]    = useState(false);
  const [showPdfPreview, setShowPdfPreview] = useState(false);

  // Simulated voice transcript lines for demo
  const DEMO_TRANSCRIPTS = [
    'Note: allow extra 2 metres of cable for ceiling void above living room',
    'Check with builder on GPO height — may need to match kitchen splashback tile line',
    'Client requested USB outlets in master bedroom — price up 2025USB units from rate library',
    'Pool equipment still TBC — hold estimate line item pending scope confirmation',
  ];

  const startRecording = (itemId) => {
    setRecording(true); setRecordingId(itemId); setVoiceInput('');
    let i=0; const words = DEMO_TRANSCRIPTS[itemId % DEMO_TRANSCRIPTS.length].split(' ');
    const iv = setInterval(()=>{
      i++;
      setVoiceInput(words.slice(0,i).join(' '));
      if(i>=words.length){ clearInterval(iv); setTimeout(()=>stopRecording(itemId, words.join(' ')),400); }
    }, 120);
  };

  const stopRecording = (itemId, text) => {
    setRecording(false); setRecordingId(null);
    if(text) setItems(prev=>prev.map(it=>it.id===itemId?{...it,note:text}:it));
  };

  const subtotal = items.reduce((s,i) => s + i.qty * i.rate, 0);
  const marginAmt = subtotal * margin / 100;
  const gst       = (subtotal + marginAmt) * 0.1;
  const total     = subtotal + marginAmt + gst;

  const updateItem = (id, field, val) => {
    setItems(prev => prev.map(i => i.id === id ? {...i, [field]: field==='desc'?val:Number(val)||0} : i));
  };
  const addItem = () => {
    const newId = Math.max(...items.map(i=>i.id)) + 1;
    setItems(prev => [...prev, {
      id:newId, desc:'New Line Item', unit:'EA', qty:1, rate:0, labour:0, mat:0,
      category:'power', lineItemType:'unit',
      rateAtEstimateDate:0, supplierId:null, componentGroupId:null,
      meta:{},
    }]);
    setEditId(newId);
  };

  // Custom line item modal state — supports optional quote PDF attachment (§4.2)
  const [showCustomModal, setShowCustomModal] = useState(false);
  const [customDraft, setCustomDraft] = useState({
    desc:'', lineItemType:'lump-sum', unit:'LS', qty:1, rate:0,
    category:'power', supplierId:'', quoteFileName:'',
  });
  const saveCustomItem = () => {
    const newId = Math.max(...items.map(i=>i.id)) + 1;
    setItems(prev => [...prev, {
      id: newId,
      desc: customDraft.desc || 'Custom Line Item',
      unit: customDraft.unit,
      qty: Number(customDraft.qty) || 1,
      rate: Number(customDraft.rate) || 0,
      labour: 0,
      mat: Number(customDraft.rate) || 0,
      category: customDraft.category,
      lineItemType: customDraft.lineItemType,
      rateAtEstimateDate: Number(customDraft.rate) || 0,
      supplierId: customDraft.supplierId || null,
      componentGroupId: null,
      quoteAttachmentUrl: customDraft.quoteFileName || null,
      meta: { custom:true, createdAt: new Date().toISOString() },
    }]);
    setShowCustomModal(false);
    setCustomDraft({ desc:'', lineItemType:'lump-sum', unit:'LS', qty:1, rate:0, category:'power', supplierId:'', quoteFileName:'' });
  };
  const removeItem = (id) => setItems(prev => prev.filter(i => i.id !== id));

  const handleLock = () => {
    setLocking(true);
    setTimeout(() => { setLocking(false); setLocked(true); }, 1800);
  };

  return (
    <div>
      <div className="flex-center gap-8 mb-16" style={{justifyContent:'space-between',flexWrap:'wrap'}}>
        <div>
          <div className="section-title">Estimate Editor</div>
          <div className="section-sub">EST-2026-001-002 · Riverside Apartments · Based on Version 002</div>
        </div>
        {!locked ? (
          <button className="btn btn-primary" onClick={handleLock} disabled={locking}>
            {locking ? '⏳ Locking…' : '🔒 Finalise & Lock'}
          </button>
        ) : (
          <div className="flex-center gap-8">
            <span className="badge badge-green">✅ Locked — 18 Mar 2026</span>
            <button className="btn btn-ghost btn-sm" onClick={()=>setShowPdfPreview(true)}>Export PDF</button>
            <button className="btn btn-ghost btn-sm">Export CSV</button>
          </div>
        )}
      </div>

      <PdfPreviewModal
        open={showPdfPreview}
        onClose={()=>setShowPdfPreview(false)}
        title="Estimate PDF — Preview"
        subtitle="EST-2026-001-002 · Riverside Apartments"
      >
        <div style={{fontSize:15,fontWeight:800,color:'#0D1B2A',marginBottom:6}}>Electrical Estimate</div>
        <div style={{fontSize:11,color:'#64748B',marginBottom:14}}>EST-2026-001-002 · Riverside Apartments · Issued 18 Mar 2026</div>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:11,marginBottom:14}}>
          <thead><tr style={{background:'#F8FAFC'}}>
            <th style={{textAlign:'left',padding:'6px 10px'}}>Description</th>
            <th style={{textAlign:'center',padding:'6px 10px'}}>Qty</th>
            <th style={{textAlign:'right',padding:'6px 10px'}}>Rate</th>
            <th style={{textAlign:'right',padding:'6px 10px'}}>Total</th>
          </tr></thead>
          <tbody>
            {items.slice(0,6).map(it=>(
              <tr key={it.id} style={{borderBottom:'1px solid #F1F5F9'}}>
                <td style={{padding:'5px 10px'}}>{it.desc}</td>
                <td style={{padding:'5px 10px',textAlign:'center'}}>{it.qty}</td>
                <td style={{padding:'5px 10px',textAlign:'right'}}>{fmt(it.rate)}</td>
                <td style={{padding:'5px 10px',textAlign:'right',fontWeight:600}}>{fmt(it.qty*it.rate)}</td>

            <tr><td colSpan="4" style={{padding:'5px 10px',fontSize:10,color:'#94A3B8',fontStyle:'italic'}}>…{items.length-6} further line items…</td></tr>

                      {LINE_ITEM_TYPES.map(t => <option key={t.id} value={t.id}>{t.label}</option>)}
                    </select>
                  </div>
                  <div>
                    <div style={{fontSize:11,fontWeight:700,letterSpacing:0.5,textTransform:'uppercase',color:'#64748B',marginBottom:5}}>Category</div>
                    <select value={customDraft.category} onChange={e=>setCustomDraft(d=>({...d,category:e.target.value}))} style={{width:'100%',padding:'8px 12px',border:'1px solid #E2E8F0',borderRadius:8,fontSize:13,background:'white'}}>
                      {tenant.categories.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}
                    </select>
                  </div>
                </div>

                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:12}}>
                  <div>
                    <div style={{fontSize:11,fontWeight:700,letterSpacing:0.5,textTransform:'uppercase',color:'#64748B',marginBottom:5}}>Unit</div>
                    <select value={customDraft.unit} onChange={e=>setCustomDraft(d=>({...d,unit:e.target.value}))} style={{width:'100%',padding:'8px 12px',border:'1px solid #E2E8F0',borderRadius:8,fontSize:13,background:'white'}}>
                      {(LINE_ITEM_TYPE_MAP[customDraft.lineItemType]?.units || ['EA']).map(u => <option key={u} value={u}>{u}</option>)}
                    </select>
                  </div>
                  <div>
                    <div style={{fontSize:11,fontWeight:700,letterSpacing:0.5,textTransform:'uppercase',color:'#64748B',marginBottom:5}}>Qty</div>
                    <input type="number" value={customDraft.qty} onChange={e=>setCustomDraft(d=>({...d,qty:e.target.value}))} style={{width:'100%',padding:'8px 12px',border:'1px solid #E2E8F0',borderRadius:8,fontSize:13}}/>

                  <div>

                </div>

                <div style={{marginBottom:12}}>

                </div>

                {LINE_ITEM_TYPE_MAP[customDraft.lineItemType]?.canAttachQuote && (

              <span className="summary-value">{fmt(subtotal)}</span>
            </div>

              <span className="summary-value">{fmt(marginAmt)}</span>
            </div>
            <div className="summary-row">
              <span className="summary-label">GST (10%)</span>
              <span className="summary-value">{fmt(gst)}</span>
            </div>
            <div className="summary-row total">
              <span>Total</span>
              <span className="summary-value green">{fmt(total)}</span>
            </div>
          </div>

          {/* ── Live Cable & Conduit Summary ──────────────────────────── */}
          {(()=>{
            const BUFFER    = 0.15;
            const lmItems   = items.filter(i => i.unit === 'LM');
            const cableItem = lmItems.find(i => i.desc.toLowerCase().includes('cable'));
            const conduitItem = lmItems.find(i => i.desc.toLowerCase().includes('conduit'));
            const otherLm   = lmItems.filter(i => i !== cableItem && i !== conduitItem);

            const cableM    = cableItem   ? cableItem.qty   : 0;
            const conduitM  = conduitItem ? conduitItem.qty : 0;
            const totalRaw  = lmItems.reduce((s,i)=>s+i.qty,0);
            const totalBuf  = Math.round(totalRaw * (1 + BUFFER));

            const cableCost   = cableItem   ? cableItem.qty   * cableItem.rate   : 0;
            const conduitCost = conduitItem ? conduitItem.qty * conduitItem.rate : 0;
            const totalLmCost = lmItems.reduce((s,i)=>s+(i.qty*i.rate),0);

            const ROW = ({label,value,bold,color})=>(
              <div className="summary-row" style={{fontSize:11}}>
                <span className="summary-label" style={{fontSize:11,maxWidth:118,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{label}</span>
                <span style={{fontWeight:bold?800:600,color:color||'#1E293B'}}>{value}</span>
              </div>
            );

            return (
              <div className="card mt-12" style={{fontSize:11}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                  <div className="label" style={{marginBottom:0}}>Cable & Conduit</div>
                  <span style={{fontSize:9,fontWeight:700,background:'#DCFCE7',color:'#166534',padding:'2px 7px',borderRadius:10,letterSpacing:'0.5px'}}>⚡ LIVE</span>
                </div>

                {/* Per-item runs */}
                {cableItem   && <ROW label={`📦 ${cableItem.desc.replace('Cable Runs — ','').replace('Cable Runs — ','')}`}   value={`${cableM.toLocaleString()} lm`} />}
                {conduitItem && <ROW label={`🔵 ${conduitItem.desc.replace(' & Accessories','')}`} value={`${conduitM.toLocaleString()} lm`} />}
                {otherLm.map(i=><ROW key={i.id} label={i.desc} value={`${i.qty.toLocaleString()} lm`} />)}

                {lmItems.length === 0 && (
                  <div style={{color:'#94A3B8',fontStyle:'italic',textAlign:'center',padding:'8px 0'}}>No LM items in estimate</div>
                )}

                {/* Totals separator */}
                <div style={{borderTop:'1px dashed #E2E8F0',margin:'8px 0'}}/>
                <ROW label="Raw Total"      value={`${totalRaw.toLocaleString()} lm`} />
                <ROW label="+15% Buffer"    value={`${totalBuf.toLocaleString()} lm`} bold color="#F59E0B" />

                {/* Cost breakdown */}
                <div style={{borderTop:'1px solid #E2E8F0',margin:'8px 0'}}/>
                {cableItem   && <ROW label="Cable cost"   value={fmt(cableCost)}   color="#1D6EFD" />}
                {conduitItem && <ROW label="Conduit cost" value={fmt(conduitCost)} color="#1D6EFD" />}
                <ROW label="Total LM cost" value={fmt(totalLmCost)} bold color="#10B981" />
              </div>
            );
          })()}

          <div style={{marginTop:12,fontSize:11,color:'#64748b',textAlign:'center'}}>
            Based on Drawing Version 002<br/>Received 18 Mar 2026
          </div>
        </div>
      </div>
    </div>
  );
}

function VariationReport() {

  const changedDelta = MOCK_VARIATION.filter(r=>r.type==='changed').reduce((s,r)=>s+r.delta,0);
  const totalDelta   = addedDelta + removedDelta + changedDelta;
  const base = 136200;
  const revised = base + totalDelta;
  const pctChange = (totalDelta / base * 100);
  const [showPdfPreview, setShowPdfPreview] = useState(false);

  return (
    <div>
      <div className="section-title">Variation Report</div>
      <div className="section-sub">EST-2026-001-001 → EST-2026-001-002 · Riverside Apartments</div>

      {/* Variation banner */}

          <div style={{fontSize:11,color:'#94a3b8',letterSpacing:'0.5px',textTransform:'uppercase'}}>Net Variation</div>

            {totalDelta>=0?'+':''}{fmt(totalDelta)}

          <div style={{fontSize:13,color:'#94a3b8'}}>{pct(pctChange)} change</div>
        </div>
        <div className="variation-divider"/>
        <div className="variation-badge">
          <div className="variation-badge-val" style={{color:'#34d399'}}>V002</div>
          <div className="variation-badge-lbl">Revised Estimate</div>

          <span style={{width:10,height:10,borderRadius:50,background:'#10b981',display:'inline-block'}}/>
          <span style={{fontSize:13,fontWeight:600}}>{MOCK_VARIATION.filter(r=>r.type==='added').length} items added</span>
          <span style={{fontSize:12,color:'#10b981',fontWeight:700}}>+{fmt(addedDelta)}</span>

        🔒 <strong>Internal document — not for distribution.</strong> Use this to inform your revised estimate before issuing to the builder.

  );

              <div style={{display:'flex',gap:8,justifyContent:'center',marginBottom:16}}>

                    style={{width:44,height:52,textAlign:'center',fontSize:22,fontWeight:800,border:`2px solid ${codeError?'#EF4444':c?'#7B2FBE':'#E2E8F0'}`,borderRadius:10,outline:'none',color:'#1E293B',fontFamily:'inherit'}}/>
                ))}
              </div>
              {codeError && <div style={{textAlign:'center',fontSize:12,color:'#EF4444',marginBottom:10}}>Please enter all 6 digits</div>}

                <div style={{display:'flex',alignItems:'center',gap:5}}><div style={{width:16,height:3,background:'#F59E0B',borderRadius:2,borderTop:'2px dashed #F59E0B',height:0}}/><span style={{color:'#64748B'}}>Forecast</span></div>
              </div>
            </div>
            <div style={{overflowX:'auto'}}>
              <svg viewBox={`0 0 ${CW+40} ${CH+40}`} style={{width:'100%',minWidth:360,display:'block'}}>

                {[0,0.25,0.5,0.75,1].map(f=>(

                <line x1="36" y1={CH} x2={CW+36} y2={CH} stroke="#E2E8F0" strokeWidth="1"/>

                  <path d={actArea}  fill="#10B981" fillOpacity="0.12"/>

              const plan = REPORT_PLAN[i];
              const act  = REPORT_ACTUAL[i];
              const variance = act !== undefined ? act - plan : null;
              return (
                <div key={i} style={{display:'grid',gridTemplateColumns:'80px 1fr 110px 110px 110px',padding:'10px 14px',borderBottom:i<REPORT_WEEKS.length-1?'1px solid #F1F5F9':'none',background:i%2===0?'white':'#FAFBFC',alignItems:'center'}}>
                  <div style={{fontSize:11,fontWeight:700,color:'#1D6EFD'}}>{w}</div>
                  <div style={{fontSize:11,color:'#64748B'}}>{i===0?'Project start':i<=4?'Logged':'Forecast'}</div>
                  <div style={{fontSize:12,fontWeight:600,color:'#64748B'}}>{fmt(plan)}</div>
                  <div style={{fontSize:12,fontWeight:600,color:act!==undefined?'#10B981':'#94A3B8'}}>{act!==undefined?fmt(act):'—'}</div>
                  <div style={{fontSize:12,fontWeight:700,color:variance===null?'#94A3B8':variance>0?'#EF4444':'#10B981'}}>
                    {variance===null?'—':(variance>0?'+':'')+fmt(Math.abs(variance))}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── HOURS ── */}
      {tab==='hours' && (
        <div>
          {/* Summary */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:12,marginBottom:16}}>
            {[
              {label:'Planned (total)',val:`${totalPlanned*2}h`,color:'#1D6EFD'},
              {label:'Logged (4wks)',  val:`${totalActual}h`,   color:'#10B981'},
              {label:'Remaining Est.', val:`${totalPlanned*2 - totalActual}h`,color:'#64748B'},
              {label:'Variance',       val:`+${totalActual-totalPlanned}h`,color:'#F59E0B'},
            ].map((s,i)=>(
              <div key={i} style={{background:'white',borderRadius:10,border:'1px solid #E2E8F0',padding:'14px',textAlign:'center'}}>
                <div style={{fontSize:22,fontWeight:800,color:s.color}}>{s.val}</div>
                <div style={{fontSize:11,color:'#64748B',marginTop:3}}>{s.label}</div>
              </div>
            ))}
          </div>

          {/* Weekly timesheet */}
          <div style={{background:'white',borderRadius:12,border:'1px solid #E2E8F0',overflow:'hidden',marginBottom:16}}>

                <div key={i} style={{display:'grid',gridTemplateColumns:'1fr 80px 80px 90px 90px 80px',padding:'11px 14px',borderBottom:i<REPORT_HOURS.length-1?'1px solid #F1F5F9':'none',background:i%2===0?'white':'#FAFBFC',alignItems:'center'}}>

                  <div style={{fontSize:12,textAlign:'center',color:'#64748B'}}>{h.planned}h</div>
                  <div style={{fontSize:12,textAlign:'center',fontWeight:700,color:h.actual>h.planned?'#EF4444':'#10B981'}}>{h.actual}h</div>
                  <div style={{fontSize:12,textAlign:'right',color:'#64748B'}}>{fmt(h.labour)}</div>
                  <div style={{fontSize:12,textAlign:'right',color:'#64748B'}}>{fmt(h.materials)}</div>
                  <div style={{fontSize:12,textAlign:'right',fontWeight:700,color:v>0?'#EF4444':'#10B981'}}>{v>0?'+':''}{v}h</div>
                </div>

            <div style={{display:'grid',gridTemplateColumns:'1fr 80px 80px 90px 90px 80px',padding:'11px 14px',background:'#F8FAFC',borderTop:'2px solid #E2E8F0',alignItems:'center'}}>
              <div style={{fontSize:12,fontWeight:700,color:'#1E293B'}}>TOTALS</div>
              <div style={{fontSize:12,textAlign:'center',fontWeight:700}}>{totalPlanned}h</div>
              <div style={{fontSize:12,textAlign:'center',fontWeight:700,color:totalActual>totalPlanned?'#EF4444':'#10B981'}}>{totalActual}h</div>
              <div style={{fontSize:12,textAlign:'right',fontWeight:700}}>{fmt(REPORT_HOURS.reduce((s,h)=>s+h.labour,0))}</div>
              <div style={{fontSize:12,textAlign:'right',fontWeight:700}}>{fmt(REPORT_HOURS.reduce((s,h)=>s+h.materials,0))}</div>
              <div style={{fontSize:12,textAlign:'right',fontWeight:700,color:'#EF4444'}}>+{totalActual-totalPlanned}h</div>
            </div>
          </div>
        </div>

      {/* ── MILESTONES ── */}
      {tab==='milestones' && (
        <div>

            {[['schedule','Payment Schedule'],['claims','Claim Status'],['deposit','Deposit + Splits']].map(([id,lbl])=>(
              <button key={id} onClick={()=>setPayTab(id)} style={{padding:'6px 14px',borderRadius:20,fontSize:12,fontWeight:700,border:`1px solid ${payTab===id?'#1D6EFD':'#E2E8F0'}`,background:payTab===id?'#1D6EFD':'white',color:payTab===id?'white':'#64748B',cursor:'pointer'}}>{lbl}</button>

            <div>
              {REPORT_MILESTONES.map((m,i)=>{

                const statusColor = meta.color;
                const statusBg    = meta.bg;
                return (
                  <div key={i} style={{background:'white',borderRadius:12,border:`1px solid ${m.warning?'#FDE68A':'#E2E8F0'}`,borderLeft:`4px solid ${statusColor}`,padding:'16px 20px',marginBottom:10,display:'flex',alignItems:'center',gap:16,flexWrap:'wrap'}}>
                    <div style={{width:52,height:52,borderRadius:26,border:`3px solid ${statusColor}`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,background:statusBg}}>
                      <div style={{textAlign:'center'}}>
                        <div style={{fontSize:13,fontWeight:800,color:statusColor}}>{m.pct}%</div>
                      </div>
                    </div>
                    <div style={{flex:1}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3,flexWrap:'wrap'}}>
                        <span style={{fontSize:14,fontWeight:700,color:'#1E293B'}}>{m.label}</span>
                        <MilestoneBadge status={m.status}/>
                      </div>
                      <div style={{fontSize:12,color:'#64748B'}}>
                        Claim amount: <strong>{fmt(m.amount)}</strong>
                        {m.invoiceNo && <span style={{marginLeft:8,color:'#1D6EFD'}}>· {m.invoiceNo}</span>}
                        {m.claimDate && <span style={{marginLeft:8,color:'#10B981'}}>Invoiced {m.claimDate}</span>}
                        {m.warning && <span style={{marginLeft:8,color:'#F59E0B'}}>Finance department notified</span>}
                      </div>
                    </div>
                    <div style={{flexShrink:0}}>
                      {m.status==='received'
                        ? <span style={{fontSize:13,fontWeight:700,color:'#10B981'}}>✓ {fmt(m.amount)}</span>

                        ? <span style={{fontSize:13,fontWeight:700,color:'#1D6EFD'}}>{fmt(m.amount)}</span>
                        : m.status==='ready-to-claim'
                        ? <button style={{padding:'7px 14px',background:'#F59E0B',color:'white',border:'none',borderRadius:8,fontWeight:700,fontSize:12,cursor:'pointer'}}>Submit Claim</button>
                        : <span style={{fontSize:12,color:'#94A3B8',fontWeight:600}}>Pending</span>
                      }
                    </div>
                  </div>
                );
              })}

              {/* Retention Release — 5th Payment Schedule item (§9.5) */}
              <div style={{background:'white',borderRadius:12,border:'1px solid #FDE68A',borderLeft:'4px solid #F59E0B',padding:'16px 20px',marginBottom:10,display:'flex',alignItems:'center',gap:16,flexWrap:'wrap'}}>
                <div style={{width:52,height:52,borderRadius:26,border:'3px solid #F59E0B',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,background:'#FFFBEB'}}>

                    <span title="Held until defect liability period ends. Typically 3–6 months post Practical Completion."

                  </div>
                  <div style={{fontSize:12,color:'#64748B'}}>
                    Retention Holdback — pending defect period · <strong>{fmt(RETENTION_AMOUNT)}</strong>
                  </div>
                </div>
                <div style={{flexShrink:0}}>
                  <span style={{fontSize:12,color:'#F59E0B',fontWeight:700}}>Pending</span>

              </div>

              </div>
            </div>
          )}

          {payTab==='deposit' && (
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {[
                {label:'Deposit on Signing',       pct:10, amount:DEPOSIT_AMOUNT, status:'received', date:'10 Mar 2026',note:'Paid on commencement'},
                {label:'Rough-in Milestone (25%)', pct:25, amount:9120,           status:'invoiced', date:'17 Mar 2026',note:'Invoice #INV-2026-012'},
                {label:'First Fix Milestone (50%)',pct:25, amount:9120,           status:'ready-to-claim', date:null, note:'Pending milestone sign-off'},
                {label:'Second Fix (75%)',         pct:25, amount:9120,           status:'pending',  date:null,          note:''},
                {label:'Retention Release',       pct:5,  amount:RETENTION_AMOUNT,status:'pending',  date:null,          note:'Retention Holdback — held until defect period ends',retention:true},
              ].map((p,i)=>{
                const meta = MILESTONE_STATUS[p.status];
                const icon = p.status==='received'?'✅':p.status==='invoiced'?'📄':p.status==='ready-to-claim'?'🟡':p.retention?'🔒':'⏳';
                return (
                  <div key={i} style={{background:'white',borderRadius:10,border:`1px solid ${p.retention?'#FDE68A':'#E2E8F0'}`,borderLeft:p.retention?'4px solid #F59E0B':undefined,padding:'14px 18px',display:'flex',alignItems:'center',gap:14,flexWrap:'wrap'}}>
                    <div style={{width:36,height:36,borderRadius:8,background:meta.bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}}>
                      {icon}
                    </div>
                    <div style={{flex:1}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                        <span style={{fontSize:13,fontWeight:700,color:'#1E293B'}}>{p.label}</span>
                        {p.retention && <span title="Held until defect liability period ends. Typically 3–6 months post Practical Completion." style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:20,background:'#FEF3C7',color:'#92400E',cursor:'help'}}>RETENTION HOLDBACK</span>}
                      </div>
                      <div style={{fontSize:11,color:'#94A3B8',marginTop:2}}>{p.note}{p.date && ` · ${p.date}`}</div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontSize:15,fontWeight:800,color:meta.color}}>{fmt(p.amount)}</div>
                      <MilestoneBadge status={p.status}/>
                    </div>
                  </div>
                );
              })}

              {/* Reconciliation note (§9.4) */}
              <div style={{marginTop:6,padding:'12px 16px',background:'#F0F9FF',border:'1px solid #BAE6FD',borderRadius:10,fontSize:12,color:'#0369A1',lineHeight:1.5}}>
                📘 <strong>Reconciliation note:</strong> Deposit ({fmt(DEPOSIT_AMOUNT)}) credited against contract total. Retention ({fmt(RETENTION_AMOUNT)}) held from final milestone payment.
              </div>
            </div>
          )}

          {payTab==='claims' && (() => {
            // §9.3 Claim Status — Deposit is a separate line above Progress Claims.
            // Total Received = Deposit + confirmed (received) payments.
            // Outstanding = Contract Value − Total Received.
            const invoicedMilestones = REPORT_MILESTONES.filter(m => m.status === 'invoiced');
            const receivedMilestones = REPORT_MILESTONES.filter(m => m.status === 'received');
            const invoicedAmt = invoicedMilestones.reduce((s,m)=>s+m.amount, 0);
            const receivedAmt = receivedMilestones.reduce((s,m)=>s+m.amount, 0);
            const invoicedRef = invoicedMilestones.map(m => m.invoiceNo).filter(Boolean).join(', ');
            const totalReceived = DEPOSIT_AMOUNT + receivedAmt;
            const outstanding   = B.total - totalReceived;
            const rows = [
              { label:'Total Contract Value',   val:fmt(B.total),       color:'#1D6EFD', note:null, bold:true },
              { label:'Deposit Received',        val:fmt(DEPOSIT_AMOUNT),color:'#10B981', note:'paid 10 Mar 2026' },
              { label:'Progress Claims Invoiced',val:fmt(invoicedAmt),   color:'#1D6EFD', note:invoicedRef || '—' },
              { label:'Progress Claims Received',val:fmt(receivedAmt),   color:receivedAmt>0?'#10B981':'#94A3B8', note:receivedAmt>0 ? null : 'awaiting payment' },
              { sep:true },
              { label:'Total Received to Date', val:fmt(totalReceived), color:'#10B981', bold:true },
              { label:'Outstanding',            val:fmt(outstanding),   color:'#F59E0B', bold:true },
            ];
            return (
              <div style={{background:'white',borderRadius:12,border:'1px solid #E2E8F0',padding:'16px 20px'}}>
                <div style={{fontSize:13,fontWeight:700,color:'#1E293B',marginBottom:12}}>Claim Summary</div>
                {rows.map((r,i)=>{
                  if (r.sep) return <div key={i} style={{height:1,background:'#E2E8F0',margin:'8px 0'}}/>;

                    <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',padding:'8px 0',borderBottom: i<rows.length-1 && !rows[i+1]?.sep ? '1px solid #F1F5F9' : 'none'}}>
                      <div>
                        <span style={{fontSize:13,color:'#64748B',fontWeight:r.bold?700:500}}>{r.label}</span>
                        {r.note && <span style={{fontSize:11,color:'#94A3B8',marginLeft:8}}>({r.note})</span>}
                      </div>
                      <span style={{fontSize:r.bold?16:14,fontWeight:r.bold?800:600,color:r.color}}>{r.val}</span>
                    </div>
                  );
                })}
              </div>
            );
          })()}
        </div>
      )}

      {/* ── OVERRUNS ── */}
      {tab==='overruns' && (
        <div>
          {/* Contingency gauge */}
          <div style={{background:'white',borderRadius:12,border:'1px solid #E2E8F0',padding:'18px 20px',marginBottom:16,display:'flex',alignItems:'center',gap:20,flexWrap:'wrap'}}>
            <div style={{flex:1}}>
              <div style={{fontSize:12,fontWeight:700,color:'#94A3B8',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:8}}>Contingency Reserve</div>
              <div style={{height:14,background:'#F1F5F9',borderRadius:7,overflow:'hidden',marginBottom:8}}>
                <div style={{height:14,borderRadius:7,width:`${(contingLeft/B.contingency)*100}%`,background:contingLeft<500?'#EF4444':'#F59E0B',transition:'width 0.5s'}}/>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:12}}>
                <span style={{color:'#94A3B8'}}>Used: <strong style={{color:'#EF4444'}}>{fmt(totalOverrun)}</strong></span>
                <span style={{color:'#94A3B8'}}>Remaining: <strong style={{color:contingLeft<500?'#EF4444':'#F59E0B'}}>{fmt(contingLeft)}</strong> of {fmt(B.contingency)}</span>

// ── Vendor Pricing / Rate Library ─────────────────────────────────────────
function VendorPricing() {
  const [activeTab, setActiveTab]   = useState('browse');
  const [category, setCategory]     = useState('All');
  const [search, setSearch]         = useState('');
  const [syncing, setSyncing]       = useState(false);
  const [syncDone, setSyncDone]     = useState(false);
  const [library, setLibrary]       = useState(TLE_PRODUCTS.filter(p=>p.synced).map(p=>({...p, myRate:p.trade})));
  const [syncPct, setSyncPct]       = useState(0);

  const filtered = TLE_PRODUCTS.filter(p => {
    const matchCat = category==='All' || p.category===category;
    const matchQ   = p.name.toLowerCase().includes(search.toLowerCase()) || p.code.toLowerCase().includes(search.toLowerCase()) || p.brand.toLowerCase().includes(search.toLowerCase());
    return matchCat && matchQ;
  });

  const addToLibrary = (p) => {
    if (!library.find(l=>l.id===p.id)) setLibrary(prev=>[...prev,{...p,myRate:p.trade}]);
  };
  const removeFromLibrary = (id) => setLibrary(prev=>prev.filter(l=>l.id!==id));
  const updateMyRate = (id,val) => setLibrary(prev=>prev.map(l=>l.id===id?{...l,myRate:Number(val)||0}:l));

  const handleSync = () => {
    setSyncing(true); setSyncDone(false); setSyncPct(0);
    const iv = setInterval(()=> {
      setSyncPct(p => {
        if(p>=100){ clearInterval(iv); setSyncing(false); setSyncDone(true); return 100; }
        return p+4;
      });
    }, 60);
  };

  return (
    <div>
      {/* Header */}
      <div className="flex-center mb-16" style={{justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
        <div>
          <div className="section-title">Rate Library</div>
          <div className="section-sub">TLE Electrical Wholesaler · B2B Trade Pricing · Last synced: Today 7:02am</div>
        </div>
        <div className="flex-center gap-8">
          {syncDone && <span className="badge badge-green">✓ 21 products synced</span>}
          <button className="btn btn-outline btn-sm" onClick={handleSync} disabled={syncing}>
            {syncing ? '⏳ Syncing…' : '🔄 Sync TLE Prices'}
          </button>
          <button className="btn btn-primary btn-sm">＋ Add Wholesaler</button>
        </div>
      </div>

      {/* Sync progress bar */}
      {syncing && (
        <div style={{background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:10,padding:'12px 16px',marginBottom:16,display:'flex',alignItems:'center',gap:12}}>
          <span>⚡</span>
          <div style={{flex:1}}>
            <div style={{fontSize:12,fontWeight:600,color:'#1D6EFD',marginBottom:4}}>Syncing trade prices from TLE Electrical…</div>
            <div style={{height:6,background:'#DBEAFE',borderRadius:3,overflow:'hidden'}}>
              <div style={{height:6,background:'#1D6EFD',borderRadius:3,width:`${syncPct}%`,transition:'width 0.1s'}}/>
            </div>
          </div>
          <span style={{fontSize:12,fontWeight:700,color:'#1D6EFD'}}>{syncPct}%</span>
        </div>
      )}

      {/* Tabs */}
      <div style={{display:'flex',borderBottom:'2px solid #E2E8F0',marginBottom:20,gap:4}}>
        {[['browse','🏪 Browse TLE Products'],['library','📚 My Rate Library'],['history','🕐 Sync History']].map(([id,lbl])=>(
          <div key={id} onClick={()=>setActiveTab(id)} style={{padding:'8px 16px',cursor:'pointer',fontWeight:600,fontSize:13,borderBottom:`2px solid ${activeTab===id?'#1D6EFD':'transparent'}`,color:activeTab===id?'#1D6EFD':'#64748B',marginBottom:-2}}>
            {lbl}
          </div>
        ))}
      </div>

      {/* ── Browse tab ── */}
      {activeTab==='browse' && (
        <div>
          <div className="flex-center gap-8 mb-16" style={{flexWrap:'wrap'}}>
            <input style={{flex:1,minWidth:200,padding:'8px 12px',border:'1px solid #E2E8F0',borderRadius:8,fontSize:13}} placeholder="Search products, codes, brands…" value={search} onChange={e=>setSearch(e.target.value)}/>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {TLE_CATEGORIES.map(c=>(
                <button key={c} onClick={()=>setCategory(c)} style={{padding:'5px 12px',borderRadius:20,fontSize:11,fontWeight:700,border:`1px solid ${category===c?'#1D6EFD':'#E2E8F0'}`,background:category===c?'#1D6EFD':'white',color:category===c?'white':'#64748B',cursor:'pointer'}}>{c}</button>
              ))}
            </div>
          </div>

          <div style={{fontSize:11,color:'#94A3B8',marginBottom:10}}>{filtered.length} products · TLE B2B trade account pricing</div>

          {/* Product table */}
          <div style={{background:'white',borderRadius:12,border:'1px solid #E2E8F0',overflow:'hidden'}}>
            <div style={{display:'grid',gridTemplateColumns:'80px 1fr 90px 80px 80px 90px 100px',padding:'8px 12px',background:'#F8FAFC',borderBottom:'1px solid #E2E8F0',fontSize:10,fontWeight:700,color:'#94A3B8',textTransform:'uppercase',letterSpacing:'0.5px'}}>
              <div>Code</div><div>Product</div><div>Brand</div><div>Trade $</div><div>RRP $</div><div>Unit</div><div>Action</div>
            </div>
            {filtered.map((p,i)=>{
              const inLib = !!library.find(l=>l.id===p.id);
              return (
                <div key={p.id} style={{display:'grid',gridTemplateColumns:'80px 1fr 90px 80px 80px 90px 100px',padding:'10px 12px',borderBottom:i<filtered.length-1?'1px solid #F1F5F9':'none',background:i%2===0?'white':'#FAFBFC',alignItems:'center'}}>
                  <div style={{fontSize:10,fontWeight:700,color:'#1D6EFD',background:'#EFF6FF',padding:'2px 6px',borderRadius:4,width:'fit-content'}}>{p.code}</div>
                  <div>
                    <div style={{fontSize:12,fontWeight:600,color:'#1E293B'}}>{p.name}</div>
                    <div style={{fontSize:10,color:'#94A3B8'}}>{p.category}</div>
                  </div>
                  <div style={{fontSize:11,color:'#64748B',fontWeight:600}}>{p.brand}</div>
                  <div style={{fontSize:14,fontWeight:800,color:'#10B981'}}>{'$'+p.trade.toFixed(2)}</div>
                  <div style={{fontSize:11,color:'#94A3B8',textDecoration:'line-through'}}>{'$'+p.rrp.toFixed(2)}</div>
                  <div style={{fontSize:11,color:'#64748B'}}>{p.unit}</div>
                  <div>
                    {inLib
                      ? <span style={{fontSize:11,fontWeight:700,color:'#10B981'}}>✓ In Library</span>
                      : <button onClick={()=>addToLibrary(p)} style={{fontSize:11,fontWeight:700,padding:'4px 10px',background:'#1D6EFD',color:'white',border:'none',borderRadius:6,cursor:'pointer'}}>＋ Add</button>
                    }
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── My Rate Library tab ── */}
      {activeTab==='library' && (
        <div>
          <div style={{fontSize:11,color:'#94A3B8',marginBottom:12}}>{library.length} items in your rate library · Rates auto-populate estimates when components are detected</div>
          <div style={{background:'white',borderRadius:12,border:'1px solid #E2E8F0',overflow:'hidden'}}>
            <div style={{display:'grid',gridTemplateColumns:'80px 1fr 90px 90px 90px 80px',padding:'8px 12px',background:'#F8FAFC',borderBottom:'1px solid #E2E8F0',fontSize:10,fontWeight:700,color:'#94A3B8',textTransform:'uppercase',letterSpacing:'0.5px'}}>
              <div>Code</div><div>Product</div><div>Trade $</div><div>My Rate $</div><div>Margin</div><div>Remove</div>
            </div>
            {library.map((p,i)=>{
              const margin = p.myRate>0 ? (((p.myRate - p.trade)/p.trade)*100).toFixed(0) : '—';
              return (
                <div key={p.id} style={{display:'grid',gridTemplateColumns:'80px 1fr 90px 90px 90px 80px',padding:'10px 12px',borderBottom:i<library.length-1?'1px solid #F1F5F9':'none',background:i%2===0?'white':'#FAFBFC',alignItems:'center'}}>
                  <div style={{fontSize:10,fontWeight:700,color:'#1D6EFD',background:'#EFF6FF',padding:'2px 6px',borderRadius:4,width:'fit-content'}}>{p.code}</div>
                  <div style={{fontSize:12,fontWeight:600,color:'#1E293B'}}>{p.name}</div>
                  <div style={{fontSize:13,fontWeight:700,color:'#10B981'}}>{'$'+p.trade.toFixed(2)}</div>
                  <div>
                    <input style={{width:70,padding:'4px 6px',border:'1px solid #60A5FA',borderRadius:6,fontSize:13,fontWeight:700,color:'#1D6EFD',background:'#EFF6FF',textAlign:'right'}} value={p.myRate} onChange={e=>updateMyRate(p.id,e.target.value)}/>
                  </div>
                  <div style={{fontSize:12,fontWeight:700,color:Number(margin)>=0?'#10B981':'#EF4444'}}>{margin!=='—'?(Number(margin)>=0?'+':'')+margin+'%':margin}</div>
                  <div><button onClick={()=>removeFromLibrary(p.id)} style={{background:'none',border:'none',cursor:'pointer',fontSize:16,color:'#EF4444'}}>✕</button></div>
                </div>
              );
            })}
          </div>
          <div style={{marginTop:12,padding:'12px 16px',background:'#FFFBEB',border:'1px solid #FDE68A',borderRadius:10,fontSize:12,color:'#92400E'}}>
            💡 <strong>Tip:</strong> Set your &quot;My Rate&quot; above trade to apply your markup at the product level. When ElectraScan detects a component, it will auto-populate using your rate, not the raw trade price.
          </div>
        </div>
      )}

      {/* ── Sync History tab ── */}
      {activeTab==='history' && (
        <div style={{background:'white',borderRadius:12,border:'1px solid #E2E8F0',overflow:'hidden'}}>
          {[
            {date:'Today 7:02am',products:21,source:'TLE Electrical',status:'success',note:'21 products updated, 3 new products added'},
            {date:'Yesterday 7:01am',products:21,source:'TLE Electrical',status:'success',note:'18 products updated, no price changes'},
            {date:'18 Mar 7:04am',products:19,source:'TLE Electrical',status:'success',note:'GPO Double price updated $11.90 → $12.50'},
            {date:'17 Mar 7:02am',products:19,source:'TLE Electrical',status:'error',note:'Sync failed: API timeout. Retried successfully at 7:08am'},
          ].map((h,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',borderBottom:i<3?'1px solid #F1F5F9':'none',background:i%2===0?'white':'#FAFBFC'}}>
              <div style={{width:8,height:8,borderRadius:4,background:h.status==='success'?'#10B981':'#EF4444',flexShrink:0}}/>
              <div style={{flex:1}}>
                <div style={{fontSize:12,fontWeight:600,color:'#1E293B'}}>{h.source} · {h.products} products</div>
                <div style={{fontSize:11,color:'#94A3B8'}}>{h.note}</div>
              </div>
              <div style={{fontSize:11,color:'#94A3B8',whiteSpace:'nowrap'}}>{h.date}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

      <div style={{background:'white',borderRadius:12,border:'1px solid #E2E8F0',overflow:'hidden'}}>
        {MOCK_EMAILS.map((e,i)=>{
          const isScanning = scanning===e.id;
          const isDone     = scanned.includes(e.id) || e.status==='scanned';
          return (
            <div key={e.id} style={{padding:'14px 16px',borderBottom:i<MOCK_EMAILS.length-1?'1px solid #F1F5F9':'none',background:i%2===0?'white':'#FAFBFC'}}>
              <div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
                {/* File icon */}
                <div style={{width:40,height:40,borderRadius:8,background:'#FFF7ED',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>
                  {e.file.endsWith('.pdf')?'📄':'🖼️'}
                </div>
                {/* Details */}
                <div style={{flex:1,minWidth:180}}>
                  <div style={{fontSize:13,fontWeight:700,color:'#1E293B'}}>{e.subject}</div>
                  <div style={{fontSize:11,color:'#94A3B8',marginTop:2}}>From: {e.from}</div>
                  <div style={{display:'flex',gap:8,marginTop:4,flexWrap:'wrap'}}>
                    <span style={{fontSize:10,fontWeight:700,color:'#1D6EFD',background:'#EFF6FF',padding:'2px 7px',borderRadius:4}}>{e.file}</span>
                    <span style={{fontSize:10,color:'#94A3B8'}}>{e.pages}p</span>
                    <span style={{fontSize:10,color:'#94A3B8'}}>📁 {e.project}</span>
                  </div>
                </div>
                {/* Time */}
                <div style={{fontSize:11,color:'#94A3B8',textAlign:'right',flexShrink:0}}>{e.received}</div>
                {/* Status / Action */}
                <div style={{flexShrink:0}}>
                  {isDone && !isScanning
                    ? <span style={{fontSize:11,fontWeight:700,color:'#10B981',background:'#D1FAE5',padding:'4px 10px',borderRadius:20}}>✓ Scanned</span>
                    : isScanning
                    ? <span style={{fontSize:11,fontWeight:700,color:'#1D6EFD',background:'#DBEAFE',padding:'4px 10px',borderRadius:20}}>⚡ Scanning…</span>
                    : <button onClick={()=>triggerScan(e.id)} style={{fontSize:11,fontWeight:700,padding:'5px 12px',background:'#1D6EFD',color:'white',border:'none',borderRadius:8,cursor:'pointer'}}>Scan Now</button>
                  }
                </div>
              </div>
              {/* Scan progress */}
              {isScanning && (
                <div style={{marginTop:10,height:4,background:'#DBEAFE',borderRadius:2,overflow:'hidden'}}>
                  <div style={{height:4,background:'#1D6EFD',borderRadius:2,animation:'scan-progress 2.2s ease-out forwards'}}/>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── App ─────────────────────────────────────────────────────────────────────
function App() {
  const [tenant, setTenantState] = useState(() => loadTenant());
  const setTenant = (t) => { setTenantState(t); saveTenant(t); };
  const tenantCtx = useMemo(() => ({ tenant, setTenant }), [tenant]);

  const [page, setPage] = useState('dashboard');
  const [selectedProject, setSelectedProject] = useState(MOCK_PROJECTS[0]);
  const [navActive, setNavActive] = useState('dashboard');
  const [showQR, setShowQR] = useState(false);
  const [qrExpiry, setQrExpiry] = useState(300); // 5 min countdown in seconds
  const [qrTimer, setQrTimer] = useState(null);

  const openQR = () => {
    setShowQR(true); setQrExpiry(300);
    const iv = setInterval(()=> setQrExpiry(s => { if(s<=1){ clearInterval(iv); setShowQR(false); return 0; } return s-1; }), 1000);
    setQrTimer(iv);
  };
  const closeQR = () => { setShowQR(false); if(qrTimer) clearInterval(qrTimer); };
  const qrFmt = (s) => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

  const navigate = (target, data) => {
    if (target === 'project-detail') {
      setSelectedProject(data);
      setPage('project-detail');
      setNavActive('projects');
    } else if (target === 'estimate') {
      setPage('estimate');
      setNavActive('estimate');
    } else if (target === 'variation') {
      setPage('variation');
      setNavActive('variation');
    } else if (target === 'projects') {
      setPage('projects');
      setNavActive('projects');
    } else {
      setPage(target);
      setNavActive(target);

            <button className="btn btn-outline btn-sm" onClick={openQR} style={{display:'flex',alignItems:'center',gap:5}}>
              📱 Continue on Mobile
            </button>
            <button className="btn btn-primary btn-sm" onClick={() => navigate('project-detail', MOCK_PROJECTS[0])}>
              + New Project
            </button>
          </div>
        </div>
        <div className="page-content">
          {renderPage()}
        </div>
      </div>

      {/* Mobile bottom nav */}
      <div className="bottom-nav">
        {NAV.slice(0,4).map(n => (
          <div key={n.id} className={`bottom-nav-item ${navActive===n.id?'active':''}`}
            onClick={() => navigate(n.id)}>
            <span className="bottom-nav-icon">{n.icon}</span>
            {n.label}
          </div>
        ))}
      </div>

      {/* ── QR Handoff Modal ── */}
      {showQR && (
        <div onClick={closeQR} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(4px)'}}>
          <div onClick={e=>e.stopPropagation()} style={{background:'white',borderRadius:20,padding:36,maxWidth:420,width:'90%',textAlign:'center',boxShadow:'0 24px 80px rgba(0,0,0,0.4)'}}>
            {/* Header */}
            <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:10,marginBottom:6}}>
              <div style={{width:36,height:36,borderRadius:9,background:'linear-gradient(135deg,#1D6EFD,#0EA5E9)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>⚡</div>
              <div style={{fontSize:18,fontWeight:800,color:'#0D1B2A'}}>Continue on Mobile</div>
            </div>
            <div style={{fontSize:13,color:'#64748B',marginBottom:24}}>Scan this code with your phone to pick up exactly where you left off</div>

            {/* QR code SVG (visual representation) */}
            <div style={{display:'inline-block',padding:16,background:'white',border:'3px solid #0D1B2A',borderRadius:12,marginBottom:20}}>
              <svg width="160" height="160" viewBox="0 0 160 160" style={{display:'block'}}>
                {/* Finder patterns */}
                <rect x="8" y="8" width="44" height="44" rx="4" fill="#0D1B2A"/>
                <rect x="14" y="14" width="32" height="32" rx="2" fill="white"/>
                <rect x="20" y="20" width="20" height="20" rx="1" fill="#0D1B2A"/>
                <rect x="108" y="8" width="44" height="44" rx="4" fill="#0D1B2A"/>
                <rect x="114" y="14" width="32" height="32" rx="2" fill="white"/>
                <rect x="120" y="20" width="20" height="20" rx="1" fill="#0D1B2A"/>
                <rect x="8" y="108" width="44" height="44" rx="4" fill="#0D1B2A"/>
                <rect x="14" y="114" width="32" height="32" rx="2" fill="white"/>
                <rect x="20" y="120" width="20" height="20" rx="1" fill="#0D1B2A"/>
                {/* Data modules (decorative) */}
                {[60,68,76,84,92,100].map(x=>[60,68,76,84,92,100].map(y=> Math.sin(x*y)>0.2 &&
                  <rect key={`${x}-${y}`} x={x} y={y} width="6" height="6" fill="#0D1B2A"/>
                ))}
                {[60,76,92].map(x=><rect key={`t${x}`} x={x} y={8} width="6" height="6" fill="#0D1B2A"/>)}
                {[60,76,92].map(x=><rect key={`b${x}`} x={x} y={152} width="6" height="6" fill="#0D1B2A"/>)}
                {[60,76,92].map(y=><rect key={`l${y}`} x={8} y={y} width="6" height="6" fill="#0D1B2A"/>)}
                {/* ElectraScan centre logo */}
                <rect x="68" y="68" width="24" height="24" rx="4" fill="#1D6EFD"/>
                <text x="80" y="84" textAnchor="middle" fill="white" fontSize="14" fontWeight="bold">⚡</text>
              </svg>
            </div>

            {/* Session info */}
            <div style={{background:'#F8FAFC',border:'1px solid #E2E8F0',borderRadius:10,padding:'12px 16px',marginBottom:20,display:'flex',gap:16,justifyContent:'center',flexWrap:'wrap'}}>
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:11,color:'#94A3B8',marginBottom:2}}>SESSION ID</div>
                <div style={{fontSize:13,fontWeight:800,color:'#0D1B2A',letterSpacing:'1px',fontFamily:'monospace'}}>ESC-7F2A-9D1B</div>
              </div>
              <div style={{width:1,background:'#E2E8F0'}}/>
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:11,color:'#94A3B8',marginBottom:2}}>EXPIRES IN</div>
                <div style={{fontSize:18,fontWeight:800,color:qrExpiry<60?'#EF4444':'#10B981',letterSpacing:'1px',fontFamily:'monospace'}}>{qrFmt(qrExpiry)}</div>
              </div>
              <div style={{width:1,background:'#E2E8F0'}}/>
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:11,color:'#94A3B8',marginBottom:2}}>CURRENT PAGE</div>
                <div style={{fontSize:12,fontWeight:700,color:'#0D1B2A'}}>{pageTitle.title}</div>
              </div>
            </div>

            {/* Steps */}
            <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:24,textAlign:'left'}}>
              {[['1','Open the ElectraScan app on your phone'],['2','Tap the QR scanner icon in the top bar'],['3','Scan this code — your session loads instantly']].map(([n,t])=>(
                <div key={n} style={{display:'flex',alignItems:'center',gap:10}}>
                  <div style={{width:22,height:22,borderRadius:11,background:'#EFF6FF',border:'1px solid #BFDBFE',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,color:'#1D6EFD',flexShrink:0}}>{n}</div>
                  <div style={{fontSize:12,color:'#64748B'}}>{t}</div>
                </div>
              ))}
            </div>

            {/* Close */}
            <button onClick={closeQR} style={{width:'100%',padding:'12px',background:'#0D1B2A',color:'white',border:'none',borderRadius:10,fontSize:14,fontWeight:700,cursor:'pointer'}}>
              Close
            </button>
          </div>
        </div>
      )}
    </div>
    </TenantContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
