<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ElectraScan — AI-powered electrical estimating</title>
  <link rel="icon" href="/favicon.ico" />

  <!--
    Anthropic design-system fonts. Preconnect + font-display:swap for fastest
    paint. Poppins: headings, numbers, UI labels. Lora: body prose + italic
    accents (the Claude-style signal). JetBrains Mono: rate codes, totals.
    These are the only three families the UI uses — added via <link> so they
    load at HTML parse time (faster than @import in CSS).
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap">
  <style>
    :root {
      color-scheme: light;
    }

    body {
      font-family: 'Lora', Georgia, serif;
      overflow: hidden;
      /* Body scroll handled by DesktopShell; this prevents a double scrollbar. */
      background-color: #faf9f5;
    }

    /* Custom scrollbar for better UI */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f4f2ea;
    }

    ::-webkit-scrollbar-thumb {
      background: #e8e6dc;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #d6d3c4;
    }

    .react-pdf__Page__canvas {
      margin: 0 auto;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
    }

    /* Force inputs to be light themed */
    input,
    select,
    textarea {
      background-color: #ffffff;
      color: #0f172a;
      color-scheme: light;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0",
    "xlsx": "https://aistudiocdn.com/xlsx@^0.18.5",
    "react-pdf": "https://aistudiocdn.com/react-pdf@^10.2.0",
    "pdfjs-dist": "https://aistudiocdn.com/pdfjs-dist@^4.8.69",
    "jszip": "https://aistudiocdn.com/jszip@^3.10.1",
    "html2canvas": "https://aistudiocdn.com/html2canvas@^1.4.1",
    "jspdf": "https://aistudiocdn.com/jspdf@^2.5.1",
    "pdf-lib": "https://aistudiocdn.com/pdf-lib@^1.17.1"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
 
</head>

<body class="h-screen w-screen flex flex-col">
  <div id="root" class="h-full w-full"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
